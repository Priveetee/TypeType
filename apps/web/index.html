<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" as="image" href="/loader.gif" />
    <title>web</title>
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        background: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }
      #app-loader-text {
        font-family: sans-serif;
        font-size: 18px;
        font-weight: 500;
        color: #e4e4e7;
        letter-spacing: 0.05em;
      }
      #app-loader-text .dot {
        animation: dot-blink 1.4s infinite;
        opacity: 0;
      }
      #app-loader-text .dot:nth-child(1) { animation-delay: 0s; }
      #app-loader-text .dot:nth-child(2) { animation-delay: 0.2s; }
      #app-loader-text .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes dot-blink {
        0%, 100% { opacity: 0; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <img src="/loader.gif" width="160" height="160" alt="" />
      <p id="app-loader-text">
        Loading<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
      </p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
