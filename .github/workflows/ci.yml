name: CI

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: true
      - run: ./scripts/validate-stack.sh

  validate-trusted:
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, Linux, X64, arko, typetype]
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: true
      - run: ./scripts/validate-stack.sh
